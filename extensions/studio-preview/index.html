<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amypo EduTech Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f4f7f9;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: #0078D4;
            color: white;
            padding: 14px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background: #005a9e; }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome, Student!</h1>
        <p>Ready for your coding test? Click below to launch the project in Amypo Coder.</p>
        
        <!-- Standard VS Code URI scheme (most reliable) -->
        <a href="vscode://AMYPO.amypo-browser/starttest?repo=https://github.com/Badsena/Amypo-Test-Sample&question=https://google.com&testId=test-101" class="btn">
            Start Test in Amypo Coder
        </a>

        <div class="footer">
            <p>Note: Requires Amypo Browser extension installed.</p>
        </div>
    </div>

</body>
</html>
